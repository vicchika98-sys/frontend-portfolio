<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results | The Steward Properties</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Section Header -->
  <section class="py-5 bg-light">
    <div class="container">
      <h2 class="text-primary fw-bold">Search Results</h2>
      <p class="text-muted">Showing results for: <span id="searchQuery" class="fw-semibold"></span></p>
    </div>
  </section>

  <!-- Results Section -->
  <section class="pb-5">
    <div class="container">
      <div id="searchResults" class="row g-4">
        <!-- JavaScript will inject matching results here -->
      </div>
    </div>
  </section>

  <!-- JS -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q')?.toLowerCase() || "";
    document.getElementById('searchQuery').textContent = query;

    const data = [
      // --- Sample entries ---
      { type: "property", title: "East Legon 3-Bedroom House", location: "East Legon", description: "A beautiful 3-bedroom house with modern finishes.", image: "images/property1.jpg" },
      { type: "blog", title: "Top 5 Investment Areas in Accra", description: "Explore booming neighborhoods in Accra and their potential.", image: "images/blog1.jpg" },
      { type: "faq", title: "How can I buy property in Ghana?", description: "You can buy property by...", image: "images/faq.jpg" }
      // Add more entries from your actual data source
    ];

    const resultsContainer = document.getElementById('searchResults');
    const matched = data.filter(item =>
      item.title.toLowerCase().includes(query) ||
      (item.description && item.description.toLowerCase().includes(query)) ||
      (item.location && item.location.toLowerCase().includes(query))
    );

    if (matched.length === 0) {
      resultsContainer.innerHTML = `<div class="col-12"><p class="text-muted">No results found.</p></div>`;
    } else {
      matched.forEach(item => {
        resultsContainer.innerHTML += `
          <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="${item.image}" class="card-img-top" alt="${item.title}">
              <div class="card-body">
                <h5 class="card-title text-primary">${item.title}</h5>
                <p class="card-text">${item.description}</p>
                ${item.type === "property" ? `<p class="text-muted"><i class="bi bi-geo-alt"></i> ${item.location}</p>` : ""}
              </div>
            </div>
          </div>
        `;
      });
    }
  </script>

</body>
</html>
